<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air-drop — Dashboard & Room</title>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js">
    </script>

    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #16161f;
            --border: #1e1e2c;
            --text: #e0e0e8;
            --text2: #a0a0b8;
            --neon-blue: #4da8ff;
            --neon-purple: #9b5eff;
            --neon-green: #4dca7a;
            --neon-glow-blue: 0 0 20px rgba(77, 168, 255, 0.5), 0 0 60px rgba(77, 168, 255, 0.2);
            --neon-glow-purple: 0 0 20px rgba(155, 94, 255, 0.5), 0 0 60px rgba(155, 94, 255, 0.2);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(77, 168, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(155, 94, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(30, 30, 50, 0.4) 0%, transparent 80%);
        }

        .app-container {
            width: 100%;
            max-width: 560px;
            padding: 20px;
            position: relative;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 28px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            animation: fadeSlideUp 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(155, 94, 255, 0.5), rgba(77, 168, 255, 0.5), transparent);
            border-radius: 50%;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(77, 168, 255, 0.4), 0 0 50px rgba(77, 168, 255, 0.1);
            }
            50% {
                box-shadow: 0 0 35px rgba(155, 94, 255, 0.6), 0 0 80px rgba(155, 94, 255, 0.25);
            }
        }
        @keyframes glowPulse {
            0%,
            100% {
                text-shadow: 0 0 20px rgba(77, 168, 255, 0.7), 0 0 50px rgba(77, 168, 255, 0.3), 0 0 80px rgba(155, 94, 255, 0.2);
            }
            50% {
                text-shadow: 0 0 30px rgba(155, 94, 255, 0.9), 0 0 70px rgba(155, 94, 255, 0.5), 0 0 110px rgba(77, 168, 255, 0.35);
            }
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.85);
            }
        }

        .main-title {
            text-align: center;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            animation: glowPulse 3s ease-in-out infinite;
        }
        .subtitle {
            text-align: center;
            color: var(--text2);
            font-size: 0.9rem;
            margin-bottom: 28px;
            letter-spacing: 0.04em;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
            text-align: center;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3d7dd8, #5b4dce);
            color: #fff;
            box-shadow: 0 4px 18px rgba(77, 120, 220, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--neon-glow-blue), 0 6px 24px rgba(77, 120, 220, 0.45);
        }
        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(155, 94, 255, 0.25);
            transform: translateY(-2px);
        }
        .btn-accent {
            background: linear-gradient(135deg, #6c3ce0, #9b5eff);
            color: #fff;
            box-shadow: 0 4px 18px rgba(155, 94, 255, 0.35);
        }
        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: var(--neon-glow-purple), 0 6px 24px rgba(155, 94, 255, 0.5);
        }
        .btn-messages {
            background: linear-gradient(135deg, #2d8a4e, #3cb878);
            color: #fff;
            box-shadow: 0 4px 18px rgba(60, 184, 120, 0.35);
        }
        .btn-messages:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(77, 202, 122, 0.5), 0 0 60px rgba(77, 202, 122, 0.2);
        }
        .btn:active {
            transform: scale(0.97);
            transition: 0.1s;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-sm {
            display: inline-block;
            width: auto;
            padding: 10px 18px;
            font-size: 0.9rem;
            margin: 4px;
        }

        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: var(--text2);
            letter-spacing: 0.03em;
            font-weight: 500;
        }
        .input-field {
            width: 100%;
            padding: 13px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 1rem;
            transition: var(--transition);
            font-family: inherit;
            resize: vertical;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 16px rgba(77, 168, 255, 0.2);
        }
        .input-field::placeholder {
            color: #555;
        }
        textarea.input-field {
            min-height: 90px;
        }

        .id-display {
            text-align: center;
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: 0.06em;
            background: linear-gradient(180deg, #fff 0%, #c0d0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glowPulse 3s ease-in-out infinite;
            padding: 20px 0;
            user-select: all;
            cursor: pointer;
            line-height: 1;
        }
        .id-label {
            text-align: center;
            color: var(--text2);
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            margin-top: 4px;
            text-transform: uppercase;
        }
        .id-card {
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 20px;
            animation: pulse 3s ease-in-out infinite;
            margin: 16px 0;
        }

        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: var(--surface2);
            border: 1.5px solid var(--neon-purple);
            border-radius: var(--radius-sm);
            padding: 14px 22px;
            color: var(--text);
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6), 0 0 18px rgba(155, 94, 255, 0.3);
            animation: toastIn 0.4s ease-out;
            pointer-events: auto;
            text-align: center;
            max-width: 90vw;
            letter-spacing: 0.02em;
        }
        .toast.leaving {
            animation: toastOut 0.35s ease-in forwards;
        }
        .toast.success {
            border-color: #4dca7a;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6), 0 0 18px rgba(77, 202, 122, 0.3);
        }
        .toast.error {
            border-color: #e05555;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6), 0 0 18px rgba(224, 85, 85, 0.3);
        }

        .received-section {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        .received-title {
            font-size: 0.85rem;
            color: var(--text2);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 12px;
            text-align: center;
        }
        .received-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 10px;
            animation: slideIn 0.4s ease-out;
            transition: var(--transition);
        }
        .received-item:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 14px rgba(77, 168, 255, 0.12);
        }
        .received-item .sender {
            font-weight: 700;
            color: var(--neon-purple);
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .received-item .msg-text {
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .received-item img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            display: block;
            margin: 8px 0;
            border: 1px solid var(--border);
        }
        .received-item .time {
            font-size: 0.75rem;
            color: var(--text2);
            margin-top: 6px;
        }
        .download-link {
            display: inline-block;
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(77, 168, 255, 0.08);
            transition: var(--transition);
            margin-top: 4px;
        }
        .download-link:hover {
            background: rgba(77, 168, 255, 0.18);
            box-shadow: 0 0 12px rgba(77, 168, 255, 0.2);
        }
        .eta-badge {
            display: inline-block;
            background: rgba(77, 202, 122, 0.15);
            color: var(--neon-green);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 12px;
            margin-left: 8px;
            letter-spacing: 0.03em;
            vertical-align: middle;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 6px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 6px;
        }

        .status-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        .status-dot.online {
            background: #4dca7a;
            box-shadow: 0 0 10px #4dca7a;
        }
        .status-dot.offline {
            background: #e05555;
            box-shadow: 0 0 10px #e05555;
            animation: none;
        }
        .status-bar {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text2);
            margin-bottom: 10px;
            letter-spacing: 0.03em;
        }

        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid var(--border);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 540px) {
            .card {
                padding: 24px 16px;
            }
            .main-title {
                font-size: 2.3rem;
            }
            .id-display {
                font-size: 3.8rem;
            }
            .btn {
                padding: 13px 18px;
                font-size: 0.95rem;
            }
        }
        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mt-16 {
            margin-top: 16px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
        .gap-8 {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>
    <div class="app-container" id="appContainer"></div>

    <script>
        (function() {
            // ══════════════════════════════════════
            // 🔥 FIREBASE INIT
            // ══════════════════════════════════════
            const firebaseConfig = {
                apiKey: "AIzaSyD13N4-9MjTrmlPwGP7mves0Exje4v2ACw",
                authDomain: "kahoot-8529e.firebaseapp.com",
                databaseURL: "https://kahoot-8529e-default-rtdb.firebaseio.com",
                projectId: "kahoot-8529e",
                storageBucket: "kahoot-8529e.firebasestorage.app",
                messagingSenderId: "313414356056",
                appId: "1:313414356056:web:4aab4587f7df9393008e2d",
                measurementId: "G-8T4CPC1BQ3"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.database();
            const storage = firebase.storage();

            // ══════════════════════════════════════
            // 🧠 ESTADO GLOBAL
            // ══════════════════════════════════════
            let currentUser = null;
            let userProfile = null;
            let currentView = 'main';
            let authMode = 'login';
            let pendingRedirect = null;
            let connectedRecipientID = null;
            let messagesListener = null;
            let recipientUID = null;
            const ASSUMED_UPLOAD_SPEED_BPS = 1.2 * 1024 * 1024; // 1.2 MB/s subida estimada
            const ASSUMED_DOWNLOAD_SPEED_BPS = 2.5 * 1024 * 1024; // 2.5 MB/s descarga estimada

            // ══════════════════════════════════════
            // 🍞 TOAST SYSTEM
            // ══════════════════════════════════════
            function showToast(message, type = 'info', duration = 3500) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.classList.add('leaving');
                    setTimeout(() => toast.remove(), 350);
                }, duration);
            }

            // ══════════════════════════════════════
            // 🔊 SONIDO DE NOTIFICACIÓN
            // ══════════════════════════════════════
            function playNotificationSound() {
                try {
                    const ctx = new(window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(660, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.4);
                } catch (e) {}
            }

            // ══════════════════════════════════════
            // ⏱ TIEMPO ESTIMADO
            // ══════════════════════════════════════
            function formatETA(seconds) {
                if (seconds < 1) return 'menos de 1 s';
                if (seconds < 60) return `${Math.round(seconds)} s`;
                const mins = Math.floor(seconds / 60);
                const secs = Math.round(seconds % 60);
                return secs > 0 ? `${mins} min ${secs} s` : `${mins} min`;
            }

            function estimateUploadTime(fileSizeBytes) {
                return fileSizeBytes / ASSUMED_UPLOAD_SPEED_BPS;
            }

            function estimateDownloadTime(fileSizeBytes) {
                return fileSizeBytes / ASSUMED_DOWNLOAD_SPEED_BPS;
            }

            // ══════════════════════════════════════
            // 🔍 OBTENER PERFIL
            // ══════════════════════════════════════
            async function fetchUserProfile(uid) {
                const snap = await db.ref('users/' + uid).once('value');
                return snap.exists() ? snap.val() : null;
            }

            // ══════════════════════════════════════
            // 🎲 GENERAR ID ÚNICO DE 6 DÍGITOS
            // ══════════════════════════════════════
            async function generateUniqueID() {
                let attempts = 0;
                while (attempts < 50) {
                    const candidate = Math.floor(100000 + Math.random() * 900000).toString();
                    const snap = await db.ref('userIDMap/' + candidate).once('value');
                    if (!snap.exists()) return candidate;
                    attempts++;
                }
                const ts = Date.now().toString().slice(-6);
                const snap = await db.ref('userIDMap/' + ts).once('value');
                if (!snap.exists()) return ts;
                return Math.floor(100000 + Math.random() * 900000).toString();
            }

            // ══════════════════════════════════════
            // 💾 GUARDAR PERFIL
            // ══════════════════════════════════════
            async function saveProfile(uid, username) {
                const userID = await generateUniqueID();
                const profileData = {
                    username: username,
                    userID: userID,
                    email: currentUser.email || '',
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                };
                await db.ref('users/' + uid).set(profileData);
                await db.ref('userIDMap/' + userID).set(uid);
                userProfile = profileData;
                return profileData;
            }

            // ══════════════════════════════════════
            // 📨 ENVIAR MENSAJE/ARCHIVO
            // ══════════════════════════════════════
            async function sendDataToRecipient(recipientID, messageText, file, onProgress) {
                if (!userProfile || !currentUser) {
                    showToast('Debes iniciar sesión primero', 'error');
                    return false;
                }
                const mapSnap = await db.ref('userIDMap/' + recipientID).once('value');
                if (!mapSnap.exists()) {
                    showToast('El ID de usuario no existe', 'error');
                    return false;
                }
                const recipUID = mapSnap.val();
                const messageData = {
                    fromUID: currentUser.uid,
                    fromUsername: userProfile.username,
                    fromUserID: userProfile.userID,
                    message: messageText || null,
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    fileUrl: null,
                    fileName: null,
                    fileType: null,
                    fileSize: null,
                };

                if (file) {
                    const sanitizedName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
                    const fileRef = storage.ref('uploads/' + recipientID + '/' + Date.now() + '_' + sanitizedName);
                    const uploadTask = fileRef.put(file);

                    // Progreso de subida
                    uploadTask.on('state_changed',
                        (snapshot) => {
                            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                            if (onProgress) onProgress(progress, snapshot.bytesTransferred, snapshot
                                .totalBytes);
                        },
                        (error) => {
                            console.error('Upload error:', error);
                            showToast('Error al subir el archivo', 'error');
                        }
                    );

                    await uploadTask;
                    const downloadURL = await fileRef.getDownloadURL();
                    messageData.fileUrl = downloadURL;
                    messageData.fileName = file.name;
                    messageData.fileSize = file.size;
                    messageData.fileType = file.type.startsWith('image/') ? 'image' : 'file';
                }

                const pushRef = db.ref('messages/' + recipientID).push();
                await pushRef.set(messageData);
                return true;
            }

            // ══════════════════════════════════════
            // 👂 ESCUCHAR MENSAJES ENTRANTES
            // ══════════════════════════════════════
            function listenForMessages(myUserID) {
                if (messagesListener) {
                    db.ref('messages/' + myUserID).off('child_added', messagesListener);
                }
                messagesListener = (snap) => {
                    const msg = snap.val();
                    if (msg && msg.fromUID !== currentUser?.uid) {
                        playNotificationSound();
                        showToast(`📥 Nuevo mensaje de ${msg.fromUsername || 'alguien'}`, 'info', 4000);
                        renderReceivedMessage(snap.key, msg);
                    }
                };
                db.ref('messages/' + myUserID).on('child_added', messagesListener);
            }

            function stopListening() {
                if (messagesListener && userProfile) {
                    db.ref('messages/' + userProfile.userID).off('child_added', messagesListener);
                    messagesListener = null;
                }
            }

            // ══════════════════════════════════════
            // 🖼 RENDERIZAR MENSAJE RECIBIDO
            // ══════════════════════════════════════
            function renderReceivedMessage(msgKey, msg, prepend = true) {
                const container = document.getElementById('receivedMessages');
                if (!container) return;
                const div = document.createElement('div');
                div.className = 'received-item';
                div.id = 'msg-' + msgKey;

                let contentHTML =
                    `<div class="sender">📨 De: ${escapeHTML(msg.fromUsername || 'Desconocido')} (ID: ${escapeHTML(msg.fromUserID || 'N/A')})</div>`;
                if (msg.message) {
                    contentHTML += `<div class="msg-text">${escapeHTML(msg.message)}</div>`;
                }
                if (msg.fileUrl) {
                    if (msg.fileType === 'image') {
                        contentHTML +=
                            `<img src="${escapeHTML(msg.fileUrl)}" alt="Imagen recibida" loading="lazy" onerror="this.style.display='none'">`;
                    }
                    const fileSize = msg.fileSize || 0;
                    const downloadSeconds = estimateDownloadTime(fileSize);
                    const etaText = fileSize > 0 ? formatETA(downloadSeconds) : 'desconocido';
                    contentHTML +=
                        `<a href="${escapeHTML(msg.fileUrl)}" target="_blank" rel="noopener" class="download-link">📎 Descargar: ${escapeHTML(msg.fileName || 'archivo')}</a>`;
                    contentHTML +=
                        `<span class="eta-badge">⏳ Descarga est. ~${etaText}</span>`;
                    if (fileSize > 0) {
                        const sizeMB = (fileSize / (1024 * 1024)).toFixed(2);
                        contentHTML +=
                            `<div style="font-size:0.7rem;color:var(--text2);margin-top:4px;">Tamaño: ${sizeMB} MB</div>`;
                    }
                }
                if (msg.timestamp) {
                    const date = new Date(msg.timestamp);
                    contentHTML +=
                        `<div class="time">🕐 ${date.toLocaleDateString()} ${date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>`;
                }
                div.innerHTML = contentHTML;
                if (prepend) {
                    container.prepend(div);
                } else {
                    container.appendChild(div);
                }
                div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function escapeHTML(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ══════════════════════════════════════
            // 🎨 RENDERIZAR VISTAS
            // ══════════════════════════════════════
            const appContainer = document.getElementById('appContainer');

            function renderMainView() {
                currentView = 'main';
                pendingRedirect = null;
                appContainer.innerHTML = `
                <div class="card">
                    <h1 class="main-title">Air-drop</h1>
                    <p class="subtitle">Comparte archivos al instante · Dashboard, Room & Mensajes</p>
                    <button class="btn btn-primary" id="btnDashboard">📊 Dashboard</button>
                    <button class="btn btn-accent" id="btnRoom">💬 Room</button>
                    <button class="btn btn-messages" id="btnMessages">📥 Mensajes</button>
                    <div class="status-bar mt-16" id="statusBar">

                        <span id="statusText">Verificando conexión...</span>
                    </div>
                </div>
            `;
                document.getElementById('btnDashboard').addEventListener('click', () => {
                    pendingRedirect = 'dashboard';
                    checkAuthAndProceed();
                });
                document.getElementById('btnRoom').addEventListener('click', () => {
                    pendingRedirect = 'room';
                    checkAuthAndProceed();

                    pendingRedirect = 'messages';

            function updateConnectionStatus() {
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                if (!dot || !text) return;
                const connected = navigator.onLine;
                dot.className = 'status-dot ' + (connected ? 'online' : 'offline');
                text.textContent = connected ? 'Conectado' : 'Sin conexión';
            }

            function checkAuthAndProceed() {
                if (currentUser) {
                    proceedAfterAuth();
                } else {
                    renderAuthView();
                }
            }

            function proceedAfterAuth() {
                if (!currentUser) {
                    renderAuthView();
                    return;
                }
                fetchUserProfile(currentUser.uid).then(profile => {
                    userProfile = profile;
                    if (!profile || !profile.username || !profile.userID) {
                        renderSetupUsernameView();
                    } else {
                        if (pendingRedirect === 'dashboard') {
                            renderShowIDView();
                        } else if (pendingRedirect === 'room') {
                            renderRoomConnectView();
                        } else if (pendingRedirect === 'messages') {
                            renderMessagesView();
                        } else {
                            renderMainView();
                        }
                    }
                }).catch(err => {
                    console.error('Error fetching profile:', err);
                    showToast('Error al cargar perfil', 'error');
                    renderAuthView();
                });
            }

            function renderAuthView() {
                currentView = 'auth';
                appContainer.innerHTML = `
                <div class="card">
                    <h1 class="main-title" style="font-size:2rem;">Air-drop</h1>
                    <p class="subtitle">${authMode === 'login' ? 'Iniciar Sesión' : 'Crear Cuenta'}</p>
                    <div class="input-group">
                        <label>Correo electrónico</label>
                        <input type="email" class="input-field" id="authEmail" placeholder="tucorreo@ejemplo.com">
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" class="input-field" id="authPassword" placeholder="••••••••">
                    </div>
                    <button class="btn btn-primary" id="btnAuthSubmit">
                        ${authMode === 'login' ? '🔐 Iniciar Sesión' : '✨ Crear Cuenta'}
                    </button>
                    <button class="btn btn-secondary" id="btnToggleAuth">
                        ${authMode === 'login' ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Inicia sesión'}
                    </button>
                    <button class="btn btn-secondary" id="btnBackToMain">← Volver</button>
                    <div class="status-bar mt-8" id="authStatus"></div>
                </div>
            `;
                document.getElementById('btnAuthSubmit').addEventListener('click', handleAuth);
                document.getElementById('btnToggleAuth').addEventListener('click', () => {
                    authMode = authMode === 'login' ? 'register' : 'login';
                    renderAuthView();
                });
                document.getElementById('btnBackToMain').addEventListener('click', () => {
                    pendingRedirect = null;
                    authMode = 'login';
                    renderMainView();
                });
                document.getElementById('authPassword').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') handleAuth();
                });
                document.getElementById('authEmail').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') document.getElementById('authPassword').focus();
                });
            }

            async function handleAuth() {
                const email = document.getElementById('authEmail').value.trim();
                const password = document.getElementById('authPassword').value;
                const statusEl = document.getElementById('authStatus');
                if (!email || !password) {
                    showToast('Completa todos los campos', 'error');
                    return;
                }
                if (password.length < 6) {
                    showToast('La contraseña debe tener al menos 6 caracteres', 'error');
                    return;
                }
                const btn = document.getElementById('btnAuthSubmit');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Procesando...';
                if (statusEl) statusEl.textContent = 'Conectando...';
                try {
                    if (authMode === 'register') {
                        await auth.createUserWithEmailAndPassword(email, password);
                        showToast('¡Cuenta creada con éxito!', 'success');
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                        showToast('¡Sesión iniciada!', 'success');
                    }
                } catch (error) {
                    let msg = 'Error desconocido';
                    if (error.code === 'auth/email-already-in-use') msg = 'Este correo ya está registrado';
                    if (error.code === 'auth/invalid-email') msg = 'Correo electrónico inválido';
                    if (error.code === 'auth/weak-password') msg = 'Contraseña demasiado débil (mín. 6 caracteres)';
                    if (error.code === 'auth/user-not-found') msg = 'Usuario no encontrado';
                    if (error.code === 'auth/wrong-password') msg = 'Contraseña incorrecta';
                    if (error.code === 'auth/invalid-credential') msg = 'Credenciales inválidas';
                    showToast(msg, 'error');
                    btn.disabled = false;
                    btn.innerHTML = authMode === 'login' ? '🔐 Iniciar Sesión' : '✨ Crear Cuenta';
                    if (statusEl) statusEl.textContent = '';
                }
            }

            function renderSetupUsernameView() {
                currentView = 'setupUsername';

                <div class="card">

            function renderShowIDView() {

                <div class="card">

                        showToast('¡ID copiado!', 'success');

                    renderRoomConnectView();

            function renderRoomConnectView() {
                currentView = 'roomConnect';
                connectedRecipientID = null;
                recipientUID = null;
                stopListening();
                appContainer.innerHTML = `
                <div class="card">
                    <h1 class="main-title" style="font-size:1.8rem;">Room</h1>
                    <p class="subtitle">Conéctate con otro usuario por su ID</p>
                    <div class="input-group">
                        <label>ID del usuario destinatario</label>

                    <button class="btn btn-secondary" id="btnBackFromRoom">← Volver al inicio</button>
                    <div class="status-bar mt-8" id="roomStatus"></div>
                </div>
            `;
                document.getElementById('btnConnect').addEventListener('click', handleConnect);
                document.getElementById('btnBackFromRoom').addEventListener('click', () => {
                    stopListening();
                    pendingRedirect = null;
                    connectedRecipientID = null;
                    recipientUID = null;
                    renderMainView();
                });
                document.getElementById('recipientIDInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') handleConnect();
                });
                setTimeout(() => document.getElementById('recipientIDInput')?.focus(), 300);
            }

            async function handleConnect() {
                const input = document.getElementById('recipientIDInput');
                const rawID = input.value.trim();
                const statusEl = document.getElementById('roomStatus');
                if (!/^\d{6}$/.test(rawID)) {
                    showToast('El ID debe tener exactamente 6 dígitos', 'error');
                    return;
                }
                if (rawID === userProfile?.userID) {
                    showToast('No puedes conectarte a tu propio ID', 'error');
                    return;
                }
                const btn = document.getElementById('btnConnect');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Buscando...';
                if (statusEl) statusEl.textContent = 'Buscando usuario...';
                try {
                    const mapSnap = await db.ref('userIDMap/' + rawID).once('value');
                    if (!mapSnap.exists()) {
                        showToast('El ID introducido no existe. Verifica e intenta de nuevo.', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '🔗 Conectar';
                        if (statusEl) statusEl.textContent = '';
                        return;
                    }
                    recipientUID = mapSnap.val();
                    connectedRecipientID = rawID;
                    const recipSnap = await db.ref('users/' + recipientUID).once('value');
                    const recipName = recipSnap.exists() ? recipSnap.val().username : 'Desconocido';
                    showToast(`✅ Conectado con ${recipName} (ID: ${rawID})`, 'success');
                    renderRoomActiveView(rawID, recipName);
                } catch (error) {
                    console.error('Error connecting:', error);
                    showToast('Error al conectar', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '🔗 Conectar';
                    if (statusEl) statusEl.textContent = '';
                }
            }

            function renderRoomActiveView(recipientID, recipientName) {
                currentView = 'roomActive';
                if (userProfile) {
                    listenForMessages(userProfile.userID);
                }
                appContainer.innerHTML = `
                <div class="card">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
                        <div>
                            <span style="color:var(--text2);font-size:0.8rem;">Conectado con</span>
                            <strong style="color:var(--neon-purple);display:block;">${escapeHTML(recipientName)}</strong>
                            <span style="font-size:0.75rem;color:var(--text2);">ID: ${escapeHTML(recipientID)}</span>
                        </div>
                        <button class="btn btn-secondary btn-sm" id="btnDisconnect">🔌 Desconectar</button>
                    </div>
                    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;border:1px solid var(--border);">
                        <p style="font-weight:600;margin-bottom:10px;font-size:0.9rem;color:var(--neon-blue);">📤 Enviar a ${escapeHTML(recipientName)}</p>
                        <textarea class="input-field" id="messageText" placeholder="Escribe un mensaje..."></textarea>
                        <div class="input-group mt-8">
                            <label style="font-size:0.8rem;">Adjuntar archivo o imagen</label>
                            <input type="file" class="input-field" id="fileInput" accept="image/*,.pdf,.doc,.docx,.txt,.zip,.rar,.mp4,.mp3,.mov,.avi,.webm" style="padding:10px;">
                        </div>
                        <div class="progress-bar-container hidden" id="progressContainer">
                            <div class="progress-bar-fill" id="progressFill"></div>
                        </div>
                        <div class="status-bar mt-8" id="sendStatus"></div>
                        <button class="btn btn-accent mt-8" id="btnSend">📨 Enviar</button>
                    </div>
                    <div class="received-section">
                        <div class="received-title">📥 Bandeja de recepción</div>
                        <div id="receivedMessages">
                            <p style="color:var(--text2);font-size:0.85rem;text-align:center;">Esperando mensajes...</p>
                        </div>
                    </div>
                    <button class="btn btn-secondary mt-8" id="btnBackToConnect">← Cambiar destinatario</button>
                </div>
            `;
                document.getElementById('btnSend').addEventListener('click', handleSend);
                document.getElementById('btnDisconnect').addEventListener('click', () => {
                    stopListening();
                    connectedRecipientID = null;
                    recipientUID = null;
                    renderRoomConnectView();
                });
                document.getElementById('btnBackToConnect').addEventListener('click', () => {
                    stopListening();
                    connectedRecipientID = null;
                    recipientUID = null;
                    renderRoomConnectView();
                });
                document.getElementById('messageText').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSend();
                    }
                });
                loadExistingMessages();
            }

            async function loadExistingMessages() {
                const container = document.getElementById('receivedMessages');
                if (!container || !userProfile) return;
                try {
                    const snap = await db.ref('messages/' + userProfile.userID).once('value');
                    container.innerHTML = '';
                    if (snap.exists()) {
                        const messages = snap.val();
                        const entries = Object.entries(messages).sort((a, b) => (a[1].timestamp || 0) - (b[1]
                            .timestamp || 0));
                        if (entries.length === 0) {
                            container.innerHTML =
                                '<p style="color:var(--text2);font-size:0.85rem;text-align:center;">Esperando mensajes...</p>';
                        }
                        entries.forEach(([key, msg]) => {
                            if (msg.fromUID !== currentUser?.uid) {
                                renderReceivedMessage(key, msg, false);
                            }
                        });
                        if (entries.length > 0 && container.children.length === 0) {
                            container.innerHTML =
                                '<p style="color:var(--text2);font-size:0.85rem;text-align:center;">Esperando mensajes...</p>';
                        }
                    } else {
                        container.innerHTML =
                            '<p style="color:var(--text2);font-size:0.85rem;text-align:center;">Esperando mensajes...</p>';
                    }
                } catch (error) {
                    console.error('Error loading messages:', error);
                }
            }

            async function handleSend() {
                if (!connectedRecipientID || !userProfile) {
                    showToast('Conéctate a un destinatario primero', 'error');
                    return;
                }
                const messageText = document.getElementById('messageText').value.trim();
                const fileInput = document.getElementById('fileInput');
                const file = fileInput.files[0];
                const statusEl = document.getElementById('sendStatus');
                const btn = document.getElementById('btnSend');
                const progressContainer = document.getElementById('progressContainer');
                const progressFill = document.getElementById('progressFill');

                if (!messageText && !file) {
                    showToast('Escribe un mensaje o adjunta un archivo', 'error');
                    return;
                }
                if (file && file.size > 15 * 1024 * 1024) {
                    showToast('El archivo es demasiado grande (máx. 15MB)', 'error');
                    return;
                }

                // Mostrar ETA de subida
                if (file) {
                    const etaSeconds = estimateUploadTime(file.size);
                    const etaFormatted = formatETA(etaSeconds);
                    if (statusEl) statusEl.textContent = `⏳ Subida estimada: ~${etaFormatted} (${(file.size/(1024*1024)).toFixed(2)} MB)`;
                    progressContainer.classList.remove('hidden');
                    progressFill.style.width = '0%';
                }

                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Enviando...';

                try {
                    const success = await sendDataToRecipient(connectedRecipientID, messageText || null, file || null,
                        (progress, bytesTransferred, totalBytes) => {
                            if (progressFill) progressFill.style.width = progress + '%';
                            const remainingBytes = totalBytes - bytesTransferred;
                            const remainingSeconds = estimateUploadTime(remainingBytes);
                            if (statusEl) statusEl.textContent =
                                `⏳ Subiendo... ${Math.round(progress)}% (restante ~${formatETA(remainingSeconds)})`;
                        });
                    if (success) {
                        showToast('✅ Enviado correctamente', 'success');
                        document.getElementById('messageText').value = '';
                        fileInput.value = '';
                        if (statusEl) statusEl.textContent = '✅ Enviado correctamente';
                        progressContainer.classList.add('hidden');
                        setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 2500);
                    }
                } catch (error) {
                    console.error('Error sending:', error);
                    showToast('Error al enviar. Intenta de nuevo.', 'error');
                    if (statusEl) statusEl.textContent = '❌ Error al enviar';
                    progressContainer.classList.add('hidden');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '📨 Enviar';
                }
            }

            // ══════════════════════════════════════
            // 📥 NUEVA VISTA DE MENSAJES (HISTORIAL)
            // ══════════════════════════════════════
            function renderMessagesView() {
                currentView = 'messagesView';
                stopListening();
                appContainer.innerHTML = `
                <div class="card">
                    <h1 class="main-title" style="font-size:1.8rem;">📥 Mensajes</h1>
                    <p class="subtitle">Historial de mensajes y archivos recibidos</p>
                    <div class="received-section">
                        <div class="received-title">Todos los mensajes recibidos</div>

                    </div>
                    <button class="btn btn-secondary mt-16" id="btnBackFromMessages">← Volver al inicio</button>
                    <div class="status-bar mt-8" id="messagesStatus"></div>

            `;
                document.getElementById('btnBackFromMessages').addEventListener('click', () => {
                    pendingRedirect = null;

            async function loadAllMessages() {
                const container = document.getElementById('receivedMessages');
                const statusEl = document.getElementById('messagesStatus');
                if (!container || !userProfile) return;
                try {
                    if (statusEl) statusEl.textContent = 'Cargando mensajes...';
                    const snap = await db.ref('messages/' + userProfile.userID).once('value');
                    container.innerHTML = '';
                    if (snap.exists()) {
                        const messages = snap.val();
                        const entries = Object.entries(messages).sort((a, b) => (b[1].timestamp || 0) - (a[1]
                            .timestamp || 0));
                        if (entries.length === 0) {
                            container.innerHTML =
                                '<p style="color:var(--text2);font-size:0.85rem;text-align:center;">No tienes mensajes todavía.</p>';
                        }
                        entries.forEach(([key, msg]) => {
                            renderReceivedMessage(key, msg, false);
                        });
                    } else {
                        container.innerHTML =
                            '<p style="color:var(--text2);font-size:0.85rem;text-align:center;">No tienes mensajes todavía.</p>';
                    }
                    if (statusEl) statusEl.textContent = entries ? `${entries.length} mensaje(s) encontrado(s)` :
                        '0 mensajes';
                } catch (error) {
                    console.error('Error loading all messages:', error);
                    container.innerHTML =
                        '<p style="color:var(--text2);font-size:0.85rem;text-align:center;">Error al cargar mensajes.</p>';
                    if (statusEl) statusEl.textContent = 'Error';
                }

            function handleLogout() {
                stopListening();
                auth.signOut().then(() => {
                    userProfile = null;
                    connectedRecipientID = null;
                    recipientUID = null;
                    pendingRedirect = null;
                    authMode = 'login';
                    renderMainView();
                    showToast('Sesión cerrada', 'info');

                    console.error('Logout error:', err);
                    showToast('Error al cerrar sesión', 'error');
                });
            }

            // ══════════════════════════════════════
            // 🔄 AUTH STATE LISTENER
            // ══════════════════════════════════════
            auth.onAuthStateChanged(async (user) => {
                const wasLoggedIn = !!currentUser;
                currentUser = user;
                if (user) {
                    const profile = await fetchUserProfile(user.uid);
                    userProfile = profile;
                    if (!wasLoggedIn && currentView === 'auth') {
                        proceedAfterAuth();
                    } else if (!wasLoggedIn && currentView === 'main') {} else if (currentView === 'main' &&
                        pendingRedirect) {
                        proceedAfterAuth();
                    }
                } else {
                    userProfile = null;
                    stopListening();
                    connectedRecipientID = null;
                    recipientUID = null;
                    if (currentView !== 'main' && currentView !== 'auth') {
                        renderMainView();
                    }
                }
                if (currentView === 'main') {
                    updateConnectionStatus();
                }
            });

            // ══════════════════════════════════════
            // 🌐 CONNECTION LISTENERS
            // ══════════════════════════════════════
            window.addEventListener('online', () => {
                updateConnectionStatus();
                showToast('Conexión restablecida', 'success', 2000);
            });
            window.addEventListener('offline', () => {
                updateConnectionStatus();
                showToast('Sin conexión a internet', 'error', 3000);
            });

            const connectedRef = db.ref('.info/connected');
            connectedRef.on('value', (snap) => {
                const fbConnected = snap.val() === true;
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                if (dot && text && currentView === 'main') {
                    dot.className = 'status-dot ' + (fbConnected ? 'online' : 'offline');
                    text.textContent = fbConnected ? 'Conectado' : 'Sin conexión al servidor';
                }
            });

            // ══════════════════════════════════════
            // 🚀 INICIO
            // ══════════════════════════════════════
            renderMainView();

            console.log('🚀 Air-drop — Dashboard, Room & Mensajes inicializado');
            console.log('📡 Firebase proyect:', firebaseConfig.projectId);
            console.log('👤 Auth state:', auth.currentUser ? 'Logged in' : 'Not logged in');
            console.log('💡 Dashboard: tu ID | Room: conectar y enviar | Mensajes: historial completo');
        })();
    </script>
</body>
</html>
