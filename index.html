<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air-drop — Dashboard & Room</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>

    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #16161f;
            --border: #1e1e2c;
            --text: #e0e0e8;
            --text2: #a0a0b8;
            --neon-blue: #4da8ff;
            --neon-purple: #9b5eff;
            --neon-green: #4dca7a;
            --gold: #f5b042;
            --gold-light: #ffd966;
            --neon-glow-blue: 0 0 20px rgba(77, 168, 255, 0.5), 0 0 60px rgba(77, 168, 255, 0.2);
            --neon-glow-purple: 0 0 20px rgba(155, 94, 255, 0.5), 0 0 60px rgba(155, 94, 255, 0.2);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(77, 168, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(155, 94, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(30, 30, 50, 0.4) 0%, transparent 80%);
        }

        .app-container {
            width: 100%;
            max-width: 560px;
            padding: 20px;
            position: relative;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 28px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            animation: fadeSlideUp 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(155, 94, 255, 0.5), rgba(77, 168, 255, 0.5), transparent);
            border-radius: 50%;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(77, 168, 255, 0.4), 0 0 50px rgba(77, 168, 255, 0.1);
            }
            50% {
                box-shadow: 0 0 35px rgba(155, 94, 255, 0.6), 0 0 80px rgba(155, 94, 255, 0.25);
            }
        }
        @keyframes glowPulse {
            0%,
            100% {
                text-shadow: 0 0 20px rgba(77, 168, 255, 0.7), 0 0 50px rgba(77, 168, 255, 0.3), 0 0 80px rgba(155, 94, 255, 0.2);
            }
            50% {
                text-shadow: 0 0 30px rgba(155, 94, 255, 0.9), 0 0 70px rgba(155, 94, 255, 0.5), 0 0 110px rgba(77, 168, 255, 0.35);
            }
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.85);
            }
        }

        .main-title {
            text-align: center;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            animation: glowPulse 3s ease-in-out infinite;
        }
        .subtitle {
            text-align: center;
            color: var(--text2);
            font-size: 0.9rem;
            margin-bottom: 28px;
            letter-spacing: 0.04em;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
            text-align: center;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3d7dd8, #5b4dce);
            color: #fff;
            box-shadow: 0 4px 18px rgba(77, 120, 220, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--neon-glow-blue), 0 6px 24px rgba(77, 120, 220, 0.45);
        }
        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(155, 94, 255, 0.25);
            transform: translateY(-2px);
        }
        .btn-accent {
            background: linear-gradient(135deg, #6c3ce0, #9b5eff);
            color: #fff;
            box-shadow: 0 4px 18px rgba(155, 94, 255, 0.35);
        }
        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: var(--neon-glow-purple), 0 6px 24px rgba(155, 94, 255, 0.5);
        }
        .btn-messages {
            background: linear-gradient(135deg, #2d8a4e, #3cb878);
            color: #fff;
            box-shadow: 0 4px 18px rgba(60, 184, 120, 0.35);
        }
        .btn-messages:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(77, 202, 122, 0.5), 0 0 60px rgba(77, 202, 122, 0.2);
        }
        .btn-call {
            background: linear-gradient(135deg, #0077ff, #00c3ff);
            color: #fff;
            box-shadow: 0 4px 18px rgba(0, 150, 255, 0.4);
        }
        .btn-call:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 180, 255, 0.6);
        }
        .btn-shop {
            background: linear-gradient(135deg, #f5b042, #d18d2c);
            color: #0a0a0f;
            font-weight: 700;
            box-shadow: 0 4px 18px rgba(245, 176, 66, 0.4);
        }
        .btn-shop:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 28px rgba(245, 176, 66, 0.7);
        }
        .btn:active {
            transform: scale(0.97);
            transition: 0.1s;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn-sm {
            display: inline-block;
            width: auto;
            padding: 10px 18px;
            font-size: 0.9rem;
            margin: 4px;
        }

        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: var(--text2);
            letter-spacing: 0.03em;
            font-weight: 500;
        }
        .input-field {
            width: 100%;
            padding: 13px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 1rem;
            transition: var(--transition);
            font-family: inherit;
            resize: vertical;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 16px rgba(77, 168, 255, 0.2);
        }
        .input-field::placeholder {
            color: #555;
        }
        textarea.input-field {
            min-height: 90px;
        }

        .id-display {
            text-align: center;
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: 0.06em;
            background: linear-gradient(180deg, #fff 0%, #c0d0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glowPulse 3s ease-in-out infinite;
            padding: 20px 0;
            user-select: all;
            cursor: pointer;
            line-height: 1;
        }
        .id-label {
            text-align: center;
            color: var(--text2);
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            margin-top: 4px;
            text-transform: uppercase;
        }
        .id-card {
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 20px;
            animation: pulse 3s ease-in-out infinite;
            margin: 16px 0;
        }

        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: var(--surface2);
            border: 1.5px solid var(--neon-purple);
            border-radius: var(--radius-sm);
            padding: 14px 22px;
            color: var(--text);
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6), 0 0 18px rgba(155, 94, 255, 0.3);
            animation: toastIn 0.4s ease-out;
            pointer-events: auto;
            text-align: center;
            max-width: 90vw;
            letter-spacing: 0.02em;
        }
        .toast.leaving {
            animation: toastOut 0.35s ease-in forwards;
        }
        .toast.success {
            border-color: #4dca7a;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6), 0 0 18px rgba(77, 202, 122, 0.3);
        }
        .toast.error {
            border-color: #e05555;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6), 0 0 18px rgba(224, 85, 85, 0.3);
        }

        .received-section {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        .received-title {
            font-size: 0.85rem;
            color: var(--text2);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 12px;
            text-align: center;
        }
        .received-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 10px;
            animation: slideIn 0.4s ease-out;
            transition: var(--transition);
        }
        .received-item:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 14px rgba(77, 168, 255, 0.12);
        }
        .received-item .sender {
            font-weight: 700;
            color: var(--neon-purple);
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .received-item .msg-text {
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .received-item img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            display: block;
            margin: 8px 0;
            border: 1px solid var(--border);
        }
        .received-item .time {
            font-size: 0.75rem;
            color: var(--text2);
            margin-top: 6px;
        }
        .download-link {
            display: inline-block;
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(77, 168, 255, 0.08);
            transition: var(--transition);
            margin-top: 4px;
        }
        .download-link:hover {
            background: rgba(77, 168, 255, 0.18);
            box-shadow: 0 0 12px rgba(77, 168, 255, 0.2);
        }
        .eta-badge {
            display: inline-block;
            background: rgba(77, 202, 122, 0.15);
            color: var(--neon-green);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 12px;
            margin-left: 8px;
            letter-spacing: 0.03em;
            vertical-align: middle;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 6px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 6px;
        }

        .status-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        .status-dot.online {
            background: #4dca7a;
            box-shadow: 0 0 10px #4dca7a;
        }
        .status-dot.offline {
            background: #e05555;
            box-shadow: 0 0 10px #e05555;
            animation: none;
        }
        .status-bar {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text2);
            margin-bottom: 10px;
            letter-spacing: 0.03em;
        }

        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid var(--border);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Videollamada ── */
        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            flex-direction: column;
            padding: 20px;
        }
        .video-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        video {
            width: 260px;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            background: #000;
            border: 2px solid var(--border);
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }
        .call-actions {
            display: flex;
            gap: 16px;
        }
        .btn-call-end {
            background: #e05555;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-call-end:hover {
            background: #ff3b3b;
        }
        .incoming-call-toast {
            background: var(--surface2);
            border: 2px solid var(--neon-purple);
            padding: 20px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: 0 0 35px rgba(155,94,255,0.5);
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
        }

        @media (max-width: 540px) {
            .card {
                padding: 24px 16px;
            }
            .main-title {
                font-size: 2.3rem;
            }
            .id-display {
                font-size: 3.8rem;
            }
            .btn {
                padding: 13px 18px;
                font-size: 0.95rem;
            }
            video {
                width: 140px;
                height: 100px;
            }
        }
        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mt-16 {
            margin-top: 16px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
        .gap-8 {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .lang-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 50;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .lang-btn:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 12px rgba(155,94,255,0.3);
        }
    </style>
</head>

            function showToast(message, type = 'info', duration = 3500) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.classList.add('leaving');
                    setTimeout(() => toast.remove(), 350);
                }, duration);
            }

            function playNotificationSound() {
                try {
                    const ctx = new(window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(660, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.4);
                } catch (e) {}
            }

            function formatETA(seconds) {
                if (seconds < 1) return 'menos de 1 s';
                if (seconds < 60) return `${Math.round(seconds)} s`;
                const mins = Math.floor(seconds / 60);
                const secs = Math.round(seconds % 60);
                return secs > 0 ? `${mins} min ${secs} s` : `${mins} min`;
            }

            function estimateUploadTime(fileSizeBytes) {
                return fileSizeBytes / ASSUMED_UPLOAD_SPEED_BPS;
            }

            function estimateDownloadTime(fileSizeBytes) {
                return fileSizeBytes / ASSUMED_DOWNLOAD_SPEED_BPS;
            }

            async function fetchUserProfile(uid) {
                const snap = await db.ref('users/' + uid).once('value');
                return snap.exists() ? snap.val() : null;

            async function generateUniqueID() {
                let attempts = 0;
                while (attempts < 50) {
                    const candidate = Math.floor(100000 + Math.random() * 900000).toString();
                    const snap = await db.ref('userIDMap/' + candidate).once('value');
                    if (!snap.exists()) return candidate;
                    attempts++;
                }
                const ts = Date.now().toString().slice(-6);
                const snap = await db.ref('userIDMap/' + ts).once('value');
                if (!snap.exists()) return ts;
                return Math.floor(100000 + Math.random() * 900000).toString();
            }

            async function saveProfile(uid, username) {

                const profileData = {
                    username: username,
                    userID: userID,
                    email: currentUser.email || '',
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                };
                await db.ref('users/' + uid).set(profileData);
                await db.ref('userIDMap/' + userID).set(uid);
                userProfile = profileData;
                return profileData;
            }

            async function sendDataToRecipient(recipientID, messageText, file, onProgress) {
                if (!userProfile || !currentUser) {
                    showToast('Debes iniciar sesión primero', 'error');
                    return false;
                }
                const mapSnap = await db.ref('userIDMap/' + recipientID).once('value');
                if (!mapSnap.exists()) {
                    showToast('El ID de usuario no existe', 'error');
                    return false;
                }
                const recipUID = mapSnap.val();
                const messageData = {
                    fromUID: currentUser.uid,
                    fromUsername: userProfile.username,
                    fromUserID: userProfile.userID,
                    message: messageText || null,
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    fileUrl: null,
                    fileName: null,
                    fileType: null,
                    fileSize: null,
                };

                if (file) {
                    const sanitizedName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
                    const fileRef = storage.ref('uploads/' + recipientID + '/' + Date.now() + '_' + sanitizedName);
                    const uploadTask = fileRef.put(file);
                    uploadTask.on('state_changed',
                        (snapshot) => {
                            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                            if (onProgress) onProgress(progress, snapshot.bytesTransferred, snapshot.totalBytes);
                        },
                        (error) => {
                            console.error('Upload error:', error);
                            showToast('Error al subir el archivo', 'error');
                        }
                    );
                    await uploadTask;
                    const downloadURL = await fileRef.getDownloadURL();
                    messageData.fileUrl = downloadURL;
                    messageData.fileName = file.name;
                    messageData.fileSize = file.size;
                    messageData.fileType = file.type.startsWith('image/') ? 'image' : 'file';
                }

                const pushRef = db.ref('messages/' + recipientID).push();
                await pushRef.set(messageData);
                return true;
            }

                const container = document.getElementById('receivedMessages');

                let contentHTML =

                if (msg.message) {
                    contentHTML += `<div class="msg-text">${escapeHTML(msg.message)}</div>`;
                }

                        contentHTML +=
                            `<img src="${escapeHTML(msg.fileUrl)}" alt="Imagen recibida" loading="lazy" onerror="this.style.display='none'">`;
                    }
                    const fileSize = msg.fileSize || 0;
                    const downloadSeconds = estimateDownloadTime(fileSize);
                    const etaText = fileSize > 0 ? formatETA(downloadSeconds) : 'desconocido';
                    contentHTML +=
                        `<a href="${escapeHTML(msg.fileUrl)}" target="_blank" rel="noopener" class="download-link">📎 Descargar: ${escapeHTML(msg.fileName || 'archivo')}</a>`;
                    contentHTML += `<span class="eta-badge">⏳ Descarga est. ~${etaText}</span>`;
                    if (fileSize > 0) {

                        contentHTML +=
                            `<div style="font-size:0.7rem;color:var(--text2);margin-top:4px;">Tamaño: ${sizeMB} MB</div>`;

                if (msg.timestamp) {

                        `<div class="time">🕐 ${date.toLocaleDateString()} ${date.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>`;
                }
                div.innerHTML = contentHTML;
                if (prepend) container.prepend(div);
                else container.appendChild(div);
                div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

                btn.disabled = true;

                try {
                    await sendDataToRecipient(connectedRecipientID, messageText || null, file || null, (p, transferred, total) => {
                        progressFill.style.width = p+'%';
                        statusEl.textContent = `⏳ ${Math.round(p)}% restante ~${formatETA(estimateUploadTime(total-transferred))}`;
                    });
                    showToast(t('sent'), 'success');
                    document.getElementById('messageText').value = '';
                    document.getElementById('fileInput').value = '';
                    progressContainer.classList.add('hidden');
                    statusEl.textContent = '';
                } catch (e) {
                    showToast(t('error'), 'error');
                    progressContainer.classList.add('hidden');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = t('send');
                }
            }

            function renderShopView() {
                currentView = 'shop';
                appContainer.innerHTML = `
                <div class="card">
                    <h1 class="main-title" style="font-size:1.8rem;">${t('shopView')}</h1>
                    <p class="subtitle">${t('shopSub')}</p>
                    <div id="shopStep1">

                        <p class="status-bar" id="shopStatus1"></p>

                    <div id="shopStep2" class="hidden">

                            <li>⚡ Mayor velocidad de transferencia</li>
                        </ul>
                        <p style="text-align:center;font-weight:700;color:var(--gold-light);">2,99 €</p>
                        <button class="btn btn-shop" id="btnPayPal">${t('paypal')}</button>
                        <button class="btn btn-accent mt-8" id="btnConfirmPayment">${t('confirmPayment')}</button>

                </div>`;
                document.getElementById('btnVerifyShopID').addEventListener('click', verifyShopID);

                    showToast('Completa el pago en PayPal y luego presiona "He completado el pago"', 'info', 5000);
                });
                document.getElementById('btnConfirmPayment').addEventListener('click', activatePremium);
                document.getElementById('btnBackFromShop').addEventListener('click', () => {
                    pendingRedirect = null;
                    renderMainView();

            async function verifyShopID() {
                const rawID = document.getElementById('shopUserIdInput').value.trim();
                const statusEl = document.getElementById('shopStatus1');
                if (!/^\d{6}$/.test(rawID)) {
                    showToast('ID inválido (6 dígitos)', 'error');
                    return;
                }
                const btn = document.getElementById('btnVerifyShopID');
                btn.disabled = true;
                btn.innerHTML = '⏳ Verificando...';
                try {
                    const mapSnap = await db.ref('userIDMap/' + rawID).once('value');
                    if (!mapSnap.exists()) {
                        showToast('Ese ID no existe en Air‑drop', 'error');
                        statusEl.textContent = 'ID no encontrado';
                        btn.disabled = false;
                        btn.innerHTML = t('verifyID');
                        return;
                    }
                    const uid = mapSnap.val();
                    const userSnap = await db.ref('users/' + uid).once('value');
                    if (!userSnap.exists()) {
                        showToast('Perfil no encontrado', 'error');
                        statusEl.textContent = 'Perfil no encontrado';
                        btn.disabled = false;
                        btn.innerHTML = t('verifyID');
                        return;
                    }
                    const profile = userSnap.val();
                    document.getElementById('shopStep1').classList.add('hidden');
                    document.getElementById('shopStep2').classList.remove('hidden');
                    document.getElementById('shopUserName').textContent = `👤 ${profile.username || 'Usuario'} (ID: ${rawID})`;
                    if (profile.premium) {
                        document.getElementById('shopStatus2').textContent = t('alreadyPremium');
                        document.getElementById('btnPayPal').classList.add('hidden');
                        document.getElementById('btnConfirmPayment').classList.add('hidden');
                    }
                    statusEl.textContent = '';
                } catch (e) {
                    showToast('Error al verificar', 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = t('verifyID');
                }
            }

            async function activatePremium() {
                const rawID = document.getElementById('shopUserIdInput').value.trim();
                if (!rawID) return;
                const statusEl = document.getElementById('shopStatus2');
                const btn = document.getElementById('btnConfirmPayment');
                btn.disabled = true;
                btn.innerHTML = '⏳ Activando...';
                try {
                    const mapSnap = await db.ref('userIDMap/' + rawID).once('value');
                    if (!mapSnap.exists()) {
                        showToast('ID no válido', 'error');
                        btn.disabled = false;
                        btn.innerHTML = t('confirmPayment');
                        return;
                    }
                    const uid = mapSnap.val();
                    await db.ref('users/' + uid).update({
                        premium: true,
                        maxFileSize: 2147483648,
                        allowEmojis: true,
                        premiumActivatedAt: firebase.database.ServerValue.TIMESTAMP
                    });
                    showToast('🎉 ¡Premium activado!', 'success');
                    statusEl.textContent = t('premiumActivated');
                    document.getElementById('btnPayPal').classList.add('hidden');
                    btn.classList.add('hidden');
                } catch (e) {
                    showToast('Error al activar Premium', 'error');
                    btn.disabled = false;
                    btn.innerHTML = t('confirmPayment');
                }
            }

            function renderFriendsView() {
                currentView = 'friends';
                appContainer.innerHTML = `
                <div class="card">

                    <div id="friendsList"></div>
                    <button class="btn btn-secondary mt-16" id="btnBackFromFriends">${t('back')}</button>
                </div>`;

                    pendingRedirect = null;
                    renderMainView();

            async function loadFriends() {
                const container = document.getElementById('friendsList');
                if (!container || !userProfile) return;
                const snap = await db.ref('friends/' + userProfile.userID).once('value');
                container.innerHTML = '';
                if (snap.exists()) {
                    const friends = snap.val();
                    const entries = Object.entries(friends);
                    if (entries.length === 0) {
                        container.innerHTML = `<p class="text-center text2">${t('noFriends')}</p>`;
                        return;
                    }
                    for (let [friendUID, friendData] of entries) {
                        const div = document.createElement('div');
                        div.className = 'received-item';
                        div.innerHTML = `
                            <span>👤 ${escapeHTML(friendData.username)} (ID: ${escapeHTML(friendData.userID)})</span>
                            <button class="btn btn-accent btn-sm open-chat-btn" data-userid="${escapeHTML(friendData.userID)}">${t('openChat')}</button>

                                            renderRoomActiveView(targetID, name);

            function renderFriendRequestsView() {
                currentView = 'friendRequests';
                appContainer.innerHTML = `
                <div class="card">
                    <h1 class="main-title" style="font-size:1.8rem;">${t('friendRequestsView')}</h1>
                    <div class="input-group">
                        <label>ID del usuario para enviar solicitud</label>
                        <input type="text" class="input-field" id="requestIDInput" placeholder="Ej: 482193" maxlength="6">
                    </div>
                    <button class="btn btn-accent" id="btnSendRequest">${t('sendRequest')}</button>
                    <div class="received-section mt-8">
                        <div class="received-title">Solicitudes recibidas</div>
                        <div id="receivedRequests"></div>
                    </div>
                    <button class="btn btn-secondary mt-16" id="btnBackFromRequests">${t('back')}</button>
                </div>`;
                document.getElementById('btnSendRequest').addEventListener('click', sendFriendRequest);
                document.getElementById('btnBackFromRequests').addEventListener('click', () => {
                    pendingRedirect = null;
                    renderMainView();
                });
                loadReceivedRequests();
            }

            async function sendFriendRequest() {
                const targetID = document.getElementById('requestIDInput').value.trim();
                if (!/^\d{6}$/.test(targetID)) return showToast('ID inválido', 'error');
                if (targetID === userProfile.userID) return showToast('No puedes enviarte solicitud a ti mismo', 'error');
                const mapSnap = await db.ref('userIDMap/' + targetID).once('value');
                if (!mapSnap.exists()) return showToast('ID no encontrado', 'error');
                const targetUID = mapSnap.val();
                // Verificar que no sean ya amigos
                const friendSnap = await db.ref(`friends/${userProfile.userID}/${targetUID}`).once('value');
                if (friendSnap.exists()) return showToast('Ya sois amigos', 'error');
                // Enviar solicitud
                await db.ref(`friendRequests/${targetUID}/${currentUser.uid}`).set({
                    fromUsername: userProfile.username,
                    fromUserID: userProfile.userID,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                showToast(t('requestSent'), 'success');
                document.getElementById('requestIDInput').value = '';
            }

            async function loadReceivedRequests() {
                const container = document.getElementById('receivedRequests');
                if (!container || !userProfile) return;
                const snap = await db.ref('friendRequests/' + currentUser.uid).once('value');
                container.innerHTML = '';
                if (snap.exists()) {
                    const requests = snap.val();
                    const entries = Object.entries(requests);
                    if (entries.length === 0) {
                        container.innerHTML = `<p class="text-center text2">${t('noRequests')}</p>`;
                        return;
                    }
                    for (let [fromUID, reqData] of entries) {
                        const div = document.createElement('div');
                        div.className = 'received-item';
                        div.innerHTML = `
                            <span>📩 ${escapeHTML(reqData.fromUsername)} (ID: ${escapeHTML(reqData.fromUserID)})</span>
                            <div class="gap-8 mt-8">
                                <button class="btn btn-accent btn-sm accept-btn" data-fromuid="${escapeHTML(fromUID)}" data-fromid="${escapeHTML(reqData.fromUserID)}">${t('accept')}</button>
                                <button class="btn btn-secondary btn-sm reject-btn" data-fromuid="${escapeHTML(fromUID)}">${t('reject')}</button>
                            </div>
                        `;
                        container.appendChild(div);
                    }
                    document.querySelectorAll('.accept-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const fromUID = e.target.dataset.fromuid;
                            const fromID = e.target.dataset.fromid;
                            await acceptFriendRequest(fromUID, fromID);
                        });
                    });
                    document.querySelectorAll('.reject-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const fromUID = e.target.dataset.fromuid;
                            await db.ref(`friendRequests/${currentUser.uid}/${fromUID}`).remove();
                            loadReceivedRequests();
                        });
                    });
                } else {
                    container.innerHTML = `<p class="text-center text2">${t('noRequests')}</p>`;
                }
            }

            async function acceptFriendRequest(fromUID, fromID) {
                // Obtener datos del solicitante
                const userSnap = await db.ref('users/' + fromUID).once('value');
                if (!userSnap.exists()) return;
                const friendProfile = userSnap.val();
                // Añadir a lista de amigos de ambos
                await db.ref(`friends/${currentUser.uid}/${fromUID}`).set({
                    username: friendProfile.username,
                    userID: friendProfile.userID,
                    addedAt: firebase.database.ServerValue.TIMESTAMP
                });
                await db.ref(`friends/${fromUID}/${currentUser.uid}`).set({
                    username: userProfile.username,
                    userID: userProfile.userID,
                    addedAt: firebase.database.ServerValue.TIMESTAMP
                });
                // Eliminar solicitud
                await db.ref(`friendRequests/${currentUser.uid}/${fromUID}`).remove();
                showToast('¡Solicitud aceptada!', 'success');
                loadReceivedRequests();
            }

            // ══════════════════════════════════════
            // 📞 WEBRTC - VIDEOLAMADA
            // ══════════════════════════════════════
            async function startCall() {
                if (!connectedRecipientID || !userProfile) return;
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                } catch (e) {
                    showToast('Permiso de cámara/micrófono denegado', 'error');
                    return;
                }
                const callId = connectedRecipientID;
                peerConnection = new RTCPeerConnection(servers);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        db.ref(`calls/${callId}/candidates/${userProfile.userID}`).push(event.candidate.toJSON());
                    }
                };
                peerConnection.ontrack = (event) => {
                    document.getElementById('remoteVideo').srcObject = event.streams[0];
                };
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await db.ref(`calls/${callId}`).set({
                    callerID: userProfile.userID,
                    callerName: userProfile.username,
                    offer: { type: offer.type, sdp: offer.sdp },
                    status: 'calling'
                });
                currentCallData = { callId, targetID: callId };
                showCallModal();
                listenForAnswer(callId);
            }

            function listenForIncomingCall() {
                if (!userProfile) return;
                const myCallRef = db.ref(`calls/${userProfile.userID}`);
                myCallRef.off('value');
                myCallRef.on('value', async (snap) => {
                    const data = snap.val();
                    if (!data || data.status !== 'calling' || callActive) return;
                    if (data.callerID === currentUser?.uid) return;
                    showIncomingCallNotification(data);
                });
            }

            function showIncomingCallNotification(callData) {
                const existing = document.getElementById('incomingCallToast');
                if (existing) existing.remove();
                const toast = document.createElement('div');
                toast.id = 'incomingCallToast';
                toast.className = 'toast incoming-call-toast';
                toast.style.position = 'fixed';
                toast.style.top = '30%';
                toast.style.left = '50%';
                toast.style.transform = 'translate(-50%, -50%)';
                toast.style.zIndex = '10001';
                toast.innerHTML = `
                    <strong>📞 ${escapeHTML(callData.callerName)} te está llamando...</strong>
                    <div class="gap-8">
                        <button class="btn btn-accent btn-sm" id="acceptCall">Aceptar</button>
                        <button class="btn btn-secondary btn-sm" id="rejectCall">Rechazar</button>
                    </div>`;
                document.body.appendChild(toast);
                document.getElementById('acceptCall').addEventListener('click', () => {
                    toast.remove();
                    acceptIncomingCall(callData);
                });
                document.getElementById('rejectCall').addEventListener('click', () => {
                    toast.remove();
                    db.ref(`calls/${userProfile.userID}`).remove();
                });
            }

            async function acceptIncomingCall(callData) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                } catch (e) {
                    showToast('Permiso de cámara denegado', 'error');
                    return;
                }
                const callId = userProfile.userID;
                peerConnection = new RTCPeerConnection(servers);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        db.ref(`calls/${callId}/candidates/${userProfile.userID}`).push(event.candidate.toJSON());
                    }
                };
                peerConnection.ontrack = (event) => {
                    document.getElementById('remoteVideo').srcObject = event.streams[0];
                };
                await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await db.ref(`calls/${callId}`).update({
                    answer: { type: answer.type, sdp: answer.sdp },
                    status: 'active'
                });
                currentCallData = { callId, targetID: callId };
                showCallModal();
                collectCandidates(callId);
            }

            function listenForAnswer(callId) {
                db.ref(`calls/${callId}/answer`).on('value', async (snap) => {
                    const answer = snap.val();
                    if (answer && peerConnection && peerConnection.signalingState !== 'stable') {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                    }
                });
                collectCandidates(callId);
            }

            function collectCandidates(callId) {
                db.ref(`calls/${callId}/candidates`).on('child_added', async (snap) => {
                    const candidates = snap.val();
                    if (candidates && peerConnection) {
                        const keys = Object.keys(candidates);
                        for (let key of keys) {
                            if (candidates[key] && candidates[key].candidate) {
                                try {
                                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidates[key]));
                                } catch (e) {}
                            }
                        }
                    }
                });
            }

            function showCallModal() {
                const existing = document.getElementById('callModal');
                if (existing) existing.remove();
                const modal = document.createElement('div');
                modal.id = 'callModal';
                modal.className = 'call-modal';
                modal.innerHTML = `
                    <div class="video-container">
                        <video id="localVideo" autoplay muted playsinline></video>
                        <video id="remoteVideo" autoplay playsinline></video>
                    </div>
                    <button class="btn-call-end" id="hangUpBtn">🔴 Colgar</button>`;
                document.body.appendChild(modal);
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('hangUpBtn').addEventListener('click', cleanupCall);
                callActive = true;
            }

            function cleanupCall() {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                if (currentCallData) {
                    db.ref(`calls/${currentCallData.callId}`).remove();
                    currentCallData = null;
                }
                const modal = document.getElementById('callModal');
                if (modal) modal.remove();
                const incoming = document.getElementById('incomingCallToast');
                if (incoming) incoming.remove();
                callActive = false;
            }

            function handleLogout() {
                stopListening();
                cleanupCall();
                auth.signOut().then(() => {
                    userProfile = null;
                    connectedRecipientID = null;
                    pendingRedirect = null;
                    renderMainView();
                });
            }

            auth.onAuthStateChanged(async (user) => {
                currentUser = user;
                if (user) {
                    userProfile = await fetchUserProfile(user.uid);
                    if (currentView === 'auth') proceedAfterAuth();
                } else {
                    userProfile = null;
                    stopListening();
                    cleanupCall();
                    if (currentView !== 'main') renderMainView();
                }
            });

            window.addEventListener('online', updateConnectionStatus);
            window.addEventListener('offline', updateConnectionStatus);
            db.ref('.info/connected').on('value', (snap) => {
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                if (dot && text) {
                    dot.className = 'status-dot ' + (snap.val() ? 'online' : 'offline');
                    text.textContent = snap.val() ? t('connected') : t('noConnection');
                }
            });

            renderMainView();
            console.log('🚀 Air-drop con amigos, solicitudes y cambio de idioma activo');
        })();
    </script>
